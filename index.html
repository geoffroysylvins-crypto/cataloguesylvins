<style>
  :root {
    --cream: #F7F4EF;
    --ink: #1C1A17;
    --ink-soft: #4A4540;
    --ink-muted: #8C867E;
    --gold: #9B7B4A;
    --gold-light: #C4A06B;
    --gold-pale: #EDE3D4;
    --border: rgba(28,26,23,0.12);
    --border-strong: rgba(28,26,23,0.25);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  /* ACCUEIL */
  #accueil { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1.5rem; }
  .logo-zone { text-align: center; margin-bottom: 3.5rem; }
  .logo-sylvins { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 300; letter-spacing: 0.2em; color: var(--ink); line-height: 1; }
  .logo-sub { font-size: 0.7rem; letter-spacing: 0.3em; color: var(--gold); text-transform: uppercase; margin-top: 0.6rem; }
  .logo-rule { width: 60px; height: 1px; background: var(--gold); margin: 1.2rem auto 0; }
  .accueil-label { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 1.5rem; }
  .profils-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; width: 100%; max-width: 900px; margin-bottom: 2.5rem; }
  .profil-btn { background: white; border: 1px solid var(--border); border-radius: 2px; padding: 1.4rem 1.2rem; cursor: pointer; text-align: left; transition: all 0.2s; position: relative; overflow: hidden; }
  .profil-btn::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); transform: scaleY(0); transition: transform 0.2s; }
  .profil-btn:hover { border-color: var(--gold-light); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
  .profil-btn:hover::before { transform: scaleY(1); }
  .profil-icon { font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; font-weight: 500; }
  .profil-name { font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 400; color: var(--ink); line-height: 1.2; }
  .profil-desc { font-size: 0.72rem; color: var(--ink-muted); margin-top: 0.4rem; line-height: 1.5; }
  .dept-section { width: 100%; max-width: 900px; }
  .dept-label { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink-muted); margin-bottom: 1rem; }
  .depts-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }
  .dept-btn { padding: 0.5rem 1rem; border: 1px solid var(--border-strong); border-radius: 2px; background: transparent; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; color: var(--ink-soft); letter-spacing: 0.05em; transition: all 0.2s; }
  .dept-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
  .accueil-footer { font-size: 0.65rem; color: var(--ink-muted); letter-spacing: 0.1em; margin-top: 2rem; }

  /* PORTAIL */
  #portail { display: none; min-height: 100vh; }
  .portail-header { background: var(--ink); color: white; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
  .header-left { display: flex; align-items: center; gap: 1.5rem; }
  .header-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; letter-spacing: 0.15em; color: white; }
  .header-badge { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold-light); border: 1px solid rgba(196,160,107,0.4); padding: 0.25rem 0.7rem; border-radius: 1px; }
  .btn-retour { font-size: 0.72rem; letter-spacing: 0.1em; color: rgba(255,255,255,0.5); background: none; border: none; cursor: pointer; font-family: 'DM Sans', sans-serif; text-decoration: underline; text-underline-offset: 3px; transition: color 0.2s; }
  .btn-retour:hover { color: white; }
  .portail-toolbar { background: white; border-bottom: 1px solid var(--border); padding: 0.9rem 2rem; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 180px; position: relative; }
  .search-wrap input { width: 100%; padding: 0.55rem 0.9rem 0.55rem 2.2rem; border: 1px solid var(--border); border-radius: 2px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--ink); background: var(--cream); outline: none; transition: border-color 0.2s; }
  .search-wrap input:focus { border-color: var(--gold); }
  .search-icon { position: absolute; left: 0.7rem; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--ink-muted); fill: none; stroke-width: 2; pointer-events: none; }
  .filter-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .fpill { font-size: 0.7rem; padding: 0.3rem 0.8rem; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--ink-soft); background: transparent; font-family: 'DM Sans', sans-serif; transition: all 0.15s; white-space: nowrap; }
  .fpill:hover { border-color: var(--gold); color: var(--gold); }
  .fpill.on { background: var(--gold); border-color: var(--gold); color: white; }
  .stats-bar { background: var(--cream); padding: 0.6rem 2rem; font-size: 0.7rem; color: var(--ink-muted); letter-spacing: 0.08em; border-bottom: 1px solid var(--border); }

  /* GRILLE */
  .grid-wrap { padding: 1.5rem 2rem; }
  .fiches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }

  /* FICHE AVEC VISUEL */
  .fiche { background: white; cursor: pointer; transition: background 0.15s; display: flex; flex-direction: column; }
  .fiche:hover { background: #FDFBF8; }
  .fiche-visuel {
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .fiche-visuel svg { width: 100%; height: 100%; }
  .fiche-body { padding: 1rem 1.2rem; flex: 1; }
  .fiche-region { font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.3rem; font-weight: 500; }
  .fiche-nom { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-weight: 400; color: var(--ink); line-height: 1.25; margin-bottom: 0.6rem; }
  .fiche-adresse { font-size: 0.7rem; color: var(--ink-muted); line-height: 1.5; margin-bottom: 0.4rem; }
  .fiche-contact { font-size: 0.7rem; color: var(--ink-soft); margin-bottom: 0.15rem; }
  .fiche-contact a { color: var(--gold); text-decoration: none; }
  .fiche-depts { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 0.7rem; }
  .d-badge { font-size: 0.58rem; padding: 2px 6px; border-radius: 1px; letter-spacing: 0.08em; font-weight: 500; }
  .d83 { background: #FDF0ED; color: #6B2D3E; border: 1px solid #D4A0A8; }
  .d06 { background: #EDF5F0; color: #2D5A3D; border: 1px solid #9AC4AB; }
  .d13 { background: #EDF2FA; color: #1E3A5F; border: 1px solid #9AB1D4; }
  .d04 { background: #FBF3E8; color: #7A4E1E; border: 1px solid #CEB08A; }
  .d05 { background: #F3F0FA; color: #3D2B6B; border: 1px solid #B5A8D4; }
  .empty-state { grid-column: 1/-1; padding: 4rem; text-align: center; color: var(--ink-muted); font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-style: italic; }

  /* MODALE */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(28,26,23,0.55); z-index: 100; align-items: center; justify-content: center; padding: 1.5rem; }
  .overlay.open { display: flex; }
  .modale { background: white; max-width: 540px; width: 100%; max-height: 88vh; overflow-y: auto; border-radius: 2px; position: relative; }
  .modale-visuel { height: 160px; position: relative; overflow: hidden; }
  .modale-visuel svg { width: 100%; height: 100%; }
  .modale-header { background: var(--ink); padding: 1.2rem 1.8rem 1.4rem; position: relative; }
  .modale-region { font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold-light); margin-bottom: 0.4rem; }
  .modale-nom { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 300; color: white; line-height: 1.2; }
  .modale-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; font-size: 1.2rem; line-height: 1; transition: color 0.15s; font-family: 'DM Sans', sans-serif; }
  .modale-close:hover { color: white; }
  .modale-body { padding: 1.5rem 1.8rem; }
  .modale-section { margin-bottom: 1.2rem; padding-bottom: 1.2rem; border-bottom: 1px solid var(--border); }
  .modale-section:last-child { border-bottom: none; margin-bottom: 0; }
  .modale-section-label { font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; font-weight: 500; }
  .modale-line { font-size: 0.83rem; color: var(--ink-soft); line-height: 1.7; }
  .modale-line a { color: var(--gold); text-decoration: none; }
  .modale-line a:hover { text-decoration: underline; }
  .modale-depts { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 0.5rem; }
  .tarif-placeholder { background: var(--cream); border: 1px dashed var(--border-strong); border-radius: 2px; padding: 1rem; text-align: center; font-size: 0.75rem; color: var(--ink-muted); font-style: italic; }

  @media (max-width: 600px) {
    .portail-header, .portail-toolbar, .grid-wrap { padding-left: 1rem; padding-right: 1rem; }
    .logo-sylvins { font-size: 2.5rem; }
    .profils-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

  Object.entries(sections).forEach(([sec, items]) => {

          ${group.classif ? `<span style="font-size:0.58rem;padding:1px 6px;border-radius:1px;${cs}">${group.classif}</span>` : ''}
        </div>`;
      group.rows.forEach(item => {
        const years = Object.keys(item.prix).sort();
        if (!years.length) return;
        h += `<div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap">

            </div>`).join('')}
          </div>
        </div>`;
      });
      h += '</div>';
    });
    h += '</div>';
  });
  h += '</div>';
  return h;
}

function renderTarifBouchard(entries) {
  const sections = {};
  entries.forEach(e => {
    if (!sections[e.section]) sections[e.section] = [];
    sections[e.section].push(e);
  });

  const CLASSIF_COLOR = {
    'Grand Cru':   'background:#FBF0E8;color:#7A3A1E;border:1px solid #CEB08A;',
    'Premier Cru': 'background:#F0EDF8;color:#4A2A7A;border:1px solid #B5A0D4;',
    'Village':     'background:#EDF5F0;color:#1E5A3A;border:1px solid #9AC4AB;',
    'Régionale':   'background:#F0F2F5;color:#3A4A6B;border:1px solid #9AB1D4;',
  };

  let html = '<div style="font-family:DM Sans,sans-serif">';

  Object.entries(sections).forEach(([sec, items]) => {
    html += `<div style="margin-bottom:1.2rem">
      <div style="font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;color:#9B7B4A;border-bottom:1px solid #9B7B4A;padding-bottom:5px;margin-bottom:0.7rem;font-weight:500">${sec}</div>`;

    items.forEach(item => {
      const years = Object.keys(item.prix).sort();
      const cs = CLASSIF_COLOR[item.classif] || '';
      html += `<div style="display:flex;align-items:flex-start;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid rgba(28,26,23,0.08);gap:8px">
        <div style="flex:1;min-width:0">
          <div style="font-size:0.82rem;color:#1C1A17;font-weight:400">${item.nom}</div>
          <span style="font-size:0.58rem;padding:1px 6px;border-radius:1px;${cs}">${item.classif}</span>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;flex-shrink:0">
          ${years.map(y => `<div style="text-align:center">
            <div style="font-size:0.58rem;color:#8C867E;margin-bottom:1px">${y}</div>
            <div style="font-size:0.78rem;font-weight:500;color:#1C1A17;white-space:nowrap">${item.prix[y]}</div>
          </div>`).join('')}
        </div>
      </div>`;
    });

    html += '</div>';
  });

  html += '<div style="font-size:0.65rem;color:#8C867E;margin-top:0.8rem;padding-top:0.8rem;border-top:0.5px solid rgba(28,26,23,0.12)">Tarifs HT · Bouteille 75cl · Franco dès 490 € HT · Mise à jour : 18/03/2026<br>* 2023 disponible dès avril 2026</div>';
  html += '</div>';
  return html;
}

    <path d="M${w/2-6} ${h*0.14} Q${w/2-13} ${h*0.22} ${w/2-10} ${h*0.3} L${w/2+10} ${h*0.3} Q${w/2+13} ${h*0.22} ${w/2+6} ${h*0.14} Z" fill="${c}"/>

    <rect x="${w/2-7}" y="${h*0.51}" width="14" height="1" rx="1" fill="white" opacity="0.18"/>
  </g>`;
}

function svgVigne(type, accent, W, H) {
  if (type === 'none') return '';
  const c = accent + '40';
  const cs = accent + '25';
  if (type === 'lavande') {
    // Provence : rangées de lavande stylisées
    let out = '';
    for (let i=0; i<5; i++) {
      const x = 20 + i*52;
      out += `<ellipse cx="${x}" cy="${H*0.78}" rx="10" ry="18" fill="${c}" transform="rotate(-5,${x},${H*0.78})"/>`;
      out += `<line x1="${x}" y1="${H*0.96}" x2="${x}" y2="${H*0.6}" stroke="${accent}55" stroke-width="1.5"/>`;
    }
    return out;
  }
  if (type === 'garrigue') {
    let out = `<path d="M0 ${H*0.82} Q${W*0.2} ${H*0.65} ${W*0.4} ${H*0.78} Q${W*0.6} ${H*0.62} ${W*0.8} ${H*0.75} Q${W*0.9} ${H*0.68} ${W} ${H*0.72}" fill="none" stroke="${c}" stroke-width="2"/>`;
    for (let i=0; i<6; i++) {
      const x = 15 + i*55;
      out += `<circle cx="${x}" cy="${H*0.72}" r="10" fill="${cs}"/>`;
    }
    return out;
  }
  if (type === 'steep') {
    // Rhône : coteaux escarpés
    return `<path d="M0 ${H} L${W*0.15} ${H*0.6} L${W*0.35} ${H*0.75} L${W*0.55} ${H*0.5} L${W*0.75} ${H*0.65} L${W} ${H*0.45} L${W} ${H} Z" fill="${cs}"/>
    <path d="M0 ${H*0.95} L${W*0.15} ${H*0.6} L${W*0.35} ${H*0.75} L${W*0.55} ${H*0.5} L${W*0.75} ${H*0.65} L${W} ${H*0.45}" fill="none" stroke="${c}" stroke-width="1.5"/>`;
  }
  if (type === 'river') {
    return `<path d="M0 ${H*0.88} Q${W*0.3} ${H*0.72} ${W*0.6} ${H*0.82} Q${W*0.8} ${H*0.88} ${W} ${H*0.78}" fill="none" stroke="${accent}30" stroke-width="8" stroke-linecap="round"/>
    <path d="M0 ${H*0.88} Q${W*0.3} ${H*0.72} ${W*0.6} ${H*0.82} Q${W*0.8} ${H*0.88} ${W} ${H*0.78}" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.4"/>`;
  }
  if (type === 'alsace') {
    // Rangées de vignes avec colline
    return `<path d="M0 ${H} Q${W*0.5} ${H*0.55} ${W} ${H} Z" fill="${cs}"/>
    <path d="M${W*0.1} ${H*0.88} L${W*0.1} ${H*0.68} M${W*0.25} ${H*0.86} L${W*0.25} ${H*0.64} M${W*0.4} ${H*0.9} L${W*0.4} ${H*0.62} M${W*0.55} ${H*0.9} L${W*0.55} ${H*0.62} M${W*0.7} ${H*0.86} L${W*0.7} ${H*0.64} M${W*0.85} ${H*0.88} L${W*0.85} ${H*0.68}" stroke="${accent}55" stroke-width="1.5"/>`;
  }
  if (type === 'hills') {
    return `<path d="M0 ${H} Q${W*0.25} ${H*0.65} ${W*0.5} ${H*0.72} Q${W*0.75} ${H*0.78} ${W} ${H*0.6} L${W} ${H} Z" fill="${cs}"/>`;
  }
  if (type === 'flat') {
    let out = '';
    for (let i=0; i<7; i++) {
      const x = 15 + i*50;
      out += `<line x1="${x}" y1="${H*0.92}" x2="${x}" y2="${H*0.72}" stroke="${accent}45" stroke-width="1.5"/>`;
      out += `<ellipse cx="${x}" cy="${H*0.70}" rx="7" ry="5" fill="${c}"/>`;
    }
    return out;
  }
  if (type === 'maquis') {
    let out = `<path d="M0 ${H*0.78} Q${W*0.2} ${H*0.65} ${W*0.5} ${H*0.7} Q${W*0.8} ${H*0.75} ${W} ${H*0.65} L${W} ${H} L0 ${H} Z" fill="${cs}"/>`;
    for (let i=0; i<5; i++) {
      const x = 20 + i*60;
      out += `<circle cx="${x}" cy="${H*0.68}" r="12" fill="${c}"/>`;
    }
    return out;
  }
  // classic : rangées de pieds
  let out = '';
  for (let i=0; i<6; i++) {
    const x = 20 + i*58;
    out += `<line x1="${x}" y1="${H*0.92}" x2="${x}" y2="${H*0.72}" stroke="${accent}45" stroke-width="1.5"/>`;
    out += `<circle cx="${x-6}" cy="${H*0.76}" r="5" fill="${c}"/>`;
    out += `<circle cx="${x+6}" cy="${H*0.74}" r="5" fill="${c}"/>`;
  }
  return out;
}

function makeBannerSVG(region, W, H, nomFournisseur) {
  if (nomFournisseur && LOGOS[nomFournisseur]) {
    return `<div style="width:100%;height:${H}px;display:flex;align-items:center;justify-content:center;background:#F9F7F4;padding:16px">
      <img src="${LOGOS[nomFournisseur]}" style="max-width:90%;max-height:${H-20}px;object-fit:contain" alt="${nomFournisseur}">
    </div>`;
  }
  const theme = REGION_THEMES[region] || REGION_THEMES["Bordeaux"];
  const { bg, accent, bottle, vigne } = theme;
  // Nombre de bouteilles selon largeur
  const nb = W > 400 ? 3 : 2;
  const spacing = W / (nb + 1);
  let bottles = '';
  for (let i = 0; i < nb; i++) {
    const bx = spacing * (i + 1) - 50;
    bottles += svgBottle(bottle, accent, 100, H * 0.85, bx, H * 0.07);
  }
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <rect width="${W}" height="${H}" fill="${bg}"/>
    ${svgVigne(vigne, accent, W, H)}
    ${bottles}
    <rect width="${W}" height="${H}" fill="url(#vignette_${region.replace(/\s/g,'_')})" opacity="0.15"/>
    <defs>
      <radialGradient id="vignette_${region.replace(/\s/g,'_')}" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="white" stop-opacity="0"/>
        <stop offset="100%" stop-color="${accent}" stop-opacity="0.4"/>
      </radialGradient>
    </defs>
  </svg>`;
}

function getBaseForDept() {
  // Cloisonnement strict : toujours filtrer par département sauf admin
  return STATE.dept === 'all' ? DATA : DATA.filter(f => f.depts.includes(STATE.dept));
}

function matchSearch(f, q) {
  if (!q) return true;
  if (f.nom.toLowerCase().includes(q)) return true;
  if (f.region.toLowerCase().includes(q)) return true;
  if (f.adresse && f.adresse.toLowerCase().includes(q)) return true;
  // Recherche dans l'index des tarifs
  const idx = SEARCH_INDEX[f.nom];
  if (idx && idx.some(k => k.includes(q))) return true;
  return false;
}

function getFiltered() {
  const base = getBaseForDept();
  const regionOk = f => !STATE.regionFilter || f.region === STATE.regionFilter;
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  return base.filter(f => regionOk(f) && matchSearch(f, q));
}

function buildRegionPills() {
  const base = getBaseForDept();
  const regions = [...new Set(base.map(f => f.region))].sort();
  document.getElementById('region-pills').innerHTML = regions.map(r =>
    `<button class="fpill${STATE.regionFilter===r?' on':''}" onclick="toggleRegion('${r.replace(/'/g,"\\'")}')">
      ${r}
    </button>`
  ).join('');
}

function toggleRegion(r) {
  STATE.regionFilter = STATE.regionFilter === r ? null : r;
  buildRegionPills(); renderGrid();
}

function renderGrid() {
  const list = getFiltered();
  document.getElementById('stats-bar').textContent =
    `${list.length} fournisseur${list.length>1?'s':''} · ${STATE.dept==='all'?'Tous départements':DEPT_LABELS[STATE.dept]}`;
  const showDepts = STATE.profil === 'all';
  if (!list.length) {
    document.getElementById('fiches-grid').innerHTML = '<div class="empty-state">Aucun fournisseur trouvé</div>';
    return;
  }
  document.getElementById('fiches-grid').innerHTML = list.map(f => {
    const idx = DATA.indexOf(f);
    const banner = makeBannerSVG(f.region, 300, 120, f.nom);
    return `<div class="fiche" onclick="ouvrirFiche(${idx})">
      <div class="fiche-visuel">${banner}</div>
      <div class="fiche-body">
        <div class="fiche-region">${f.region}</div>
        <div class="fiche-nom">${f.nom}</div>
        ${APPELLATIONS[f.nom] ? `<div class="fiche-adresse" style="color:#9B7B4A;font-style:italic">${APPELLATIONS[f.nom]}</div>` : (f.adresse ? `<div class="fiche-adresse">${f.adresse}</div>` : '')}
        ${f.contact ? `<div class="fiche-contact">${f.contact}</div>` : ''}
        ${showDepts ? `<div class="fiche-depts">${f.depts.map(d=>`<span class="d-badge d${d}">${DEPT_LABELS[d]}</span>`).join('')}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

        if (info.email) footerHtml += `<div style="margin-bottom:2px"><a href="mailto:${info.email}" style="color:#9B7B4A;text-decoration:underline">${info.email}</a></div>`;
        if (info.tel_commande) footerHtml += `<div style="margin-bottom:2px">Commandes : ${info.tel_commande}</div>`;
        if (info.rib) footerHtml += `<div style="color:#C4823A;font-style:italic">${info.rib}</div>`;
        if (info.note) footerHtml += `<div style="font-style:italic">${info.note}</div>`;
      }
      if (footerHtml) tarifContent += `<div style="font-size:0.65rem;color:#8C867E;margin-top:0.8rem;padding-top:0.8rem;border-top:0.5px solid rgba(28,26,23,0.12);line-height:1.8">${footerHtml}</div>`;
      body += `<div class="modale-section"><div class="modale-section-label">${isDevillard ? "Tarifs A&A Devillard 2026" : "Tarif 2026"}</div>${tarifContent}</div>`;
    } else {
      body += `<div class="modale-section"><div class="modale-section-label">Tarif</div><div class="tarif-placeholder">Tarif à venir</div></div>`;
    }
    // Fiches techniques
    const FICHES = {"Domaine Sérol": {"Éclat de Granite": {"cepage": "Gamay Saint-Romain", "style": "Le vin de découverte du domaine — fruité, minéral, sur le granite.", "nez_bouche": "Nez de cerise fraîche et de framboise, bouche légère aux tanins souples et finale saline.", "accords": ["Charcuterie de pays, saucisson sec", "Poulet fermier rôti aux herbes", "Fromages de chèvre frais"], "service": "14-16°C", "garde": "À boire dans 2-4 ans"}, "Les Blondins": {"cepage": "Gamay Saint-Romain", "style": "Cuvée de prestige née d'une coopération avec la famille Troisgros.", "nez_bouche": "Nez floral et fruits rouges intenses, bouche structurée avec une belle tension minérale.", "accords": ["Volaille de Bresse à la crème", "Pigeon rôti aux champignons sauvages", "Veau aux morilles"], "service": "15-17°C", "garde": "3-6 ans"}, "Oudan": {"cepage": "Gamay Saint-Romain", "style": "Expression solaire d'un coteau plein sud — chaleureux et généreux.", "nez_bouche": "Nez de fruits noirs mûrs et d'épices douces, bouche ample et charnue à la finale persistante.", "accords": ["Côte de bœuf grillée", "Agneau en croûte d'herbes", "Canard aux cerises"], "service": "16-18°C", "garde": "4-7 ans"}, "Millerands": {"cepage": "Gamay Saint-Romain", "style": "Petits grains d'altitude pour une concentration et une précision rares.", "nez_bouche": "Nez complexe de petits fruits noirs, violette et granite. Bouche serrée, concentrée, longue finale minérale.", "accords": ["Filet de bœuf en croûte", "Gibier à plume, faisan rôti", "Fromages affinés (comté 24 mois)"], "service": "16-17°C", "garde": "5-8 ans"}, "Perdrizière": {"cepage": "Gamay Saint-Romain", "style": "Le sol manganèse forge un vin profond et d'une rare personnalité.", "nez_bouche": "Nez profond de mûre, cassis et terre humide. Bouche généreuse aux tanins fermes, finale longue et minérale.", "accords": ["Entrecôte sauce bordelaise", "Lièvre à la royale", "Plateau de fromages affinés"], "service": "17-18°C", "garde": "6-10 ans"}, "Chez Muron / Chez Coste (amphore)": {"cepage": "Gamay Saint-Romain", "style": "L'expression la plus pure du terroir — vinification en amphore sans artifice.", "nez_bouche": "Nez tertiaire de fruits séchés, épices et argile. Bouche texturée, tannique, d'une grande complexité aromatique.", "accords": ["Tajine d'agneau aux pruneaux", "Magret de canard aux figues", "Fromages à pâte persillée (roquefort)"], "service": "17-18°C", "garde": "7-12 ans"}, "Oudan — De Butte en Blanc": {"cepage": "Viognier", "style": "Un Viognier d'altitude étonnant — floral, sec et élégant.", "nez_bouche": "Nez d'abricot, pêche blanche et fleurs blanches. Bouche fraîche et aromatique, finale saline.", "accords": ["Langoustines rôties au beurre", "Poulet au citron et thym", "Saint-Jacques à la crème de poireaux"], "service": "10-12°C", "garde": "2-4 ans"}, "Champtoisé": {"cepage": "Chenin", "style": "Chenin sur granite — sec, aromatique, d'une belle fraîcheur.", "nez_bouche": "Nez de fleurs blanches, pomme verte et silex. Bouche tendue, minérale, avec une acidité vivifiante.", "accords": ["Huîtres gratinées", "Sole meunière", "Risotto aux herbes fraîches"], "service": "10-12°C", "garde": "3-5 ans"}, "Infusion": {"cepage": "Chenin", "style": "Macération 7 mois en amphore — un blanc hors norme, intense et aromatique.", "nez_bouche": "Nez expressif d'agrumes confits, miel et épices. Bouche riche et texturée aux tanins fondus.", "accords": ["Homard breton en sauce corail", "Foie gras poêlé aux agrumes", "Tajine de poulet aux citrons confits"], "service": "13-15°C", "garde": "4-7 ans"}, "Cabochard": {"cepage": "Gamay", "style": "Un rosé sec biologique franc et gourmand — l'été en bouteille.", "nez_bouche": "Nez de fraise, groseille et fleurs. Bouche fraîche, légère, avec une belle vivacité.", "accords": ["Salade niçoise", "Tartare de thon et avocat", "Plancha de légumes grillés"], "service": "8-10°C", "garde": "À boire dans l'année"}, "Pourquoi Faire Sans Blanc": {"cepage": "Chenin", "style": "Un blanc bio libre et original — franc, direct, sans compromis.", "nez_bouche": "Nez de poire, agrumes frais et fleurs blanches. Bouche vive et droite, minérale.", "accords": ["Ceviche de daurade", "Carpaccio de Saint-Jacques", "Fromage de chèvre frais au miel"], "service": "9-11°C", "garde": "1-3 ans"}, "Espiègle": {"cepage": "Chenin", "style": "Pétillant naturel de Chenin — festif, vif et élégant.", "nez_bouche": "Nez de pomme verte, citron et brioche. Bulles fines, bouche fraîche et légèrement crémeuse.", "accords": ["Apéritif et mise en bouche", "Fruits de mer et huîtres", "Tarte fine aux pommes"], "service": "7-9°C", "garde": "À boire dans l'année"}, "Turbullent": {"cepage": "Gamay", "style": "Pétillant rosé à 10,5° — festif, gourmand, presque espiègle.", "nez_bouche": "Nez de framboise, fraise des bois et rose. Bouche légère, bulles fines, finale fraîche et fruitée.", "accords": ["Apéritif dinatoire", "Fraises et framboises fraîches", "Gâteau aux fruits rouges"], "service": "7-8°C", "garde": "À boire dans l'année"}}};
    const fichesDom = FICHES[tarifKey];
    if (fichesDom && STATE.profil !== 'notarif') {
      let fichesHtml = '';
      Object.entries(fichesDom).forEach(([nom,fc]) => {
        fichesHtml += `<div style="background:#FDFBF8;border:0.5px solid rgba(28,26,23,0.1);border-radius:6px;padding:0.9rem 1rem;margin-bottom:0.7rem">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:0.5rem">
            <div style="font-family:'Cormorant Garamond',serif;font-size:1rem;color:#1C1A17">${nom}</div>
            <span style="font-size:0.6rem;background:#F5EBE8;color:#6B3A2A;border:1px solid #CEB08A;padding:1px 7px;border-radius:2px;white-space:nowrap;flex-shrink:0">${fc.cepage}</span>
          </div>
          <div style="font-size:0.75rem;color:#4A4540;font-style:italic;margin-bottom:0.5rem;line-height:1.5">${fc.style}</div>
          <div style="font-size:0.72rem;color:#6B6560;line-height:1.6;margin-bottom:0.6rem">${fc.nez_bouche}</div>
          <div style="margin-bottom:0.5rem">
            <div style="font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:#9B7B4A;margin-bottom:4px">Accords mets & vins</div>
            ${fc.accords.map(a=>`<div style="font-size:0.7rem;color:#4A4540;padding:2px 0;border-bottom:0.5px solid rgba(28,26,23,0.06)">· ${a}</div>`).join('')}
          </div>
          <div style="display:flex;gap:10px;margin-top:6px">
            <span style="font-size:0.62rem;color:#8C867E">Service : ${fc.service}</span>
            <span style="font-size:0.62rem;color:#8C867E">Garde : ${fc.garde}</span>
          </div>
        </div>`;
      });
      body += `<div class="modale-section"><div class="modale-section-label" style="margin-bottom:0.8rem">Fiches cuvées</div>${fichesHtml}</div>`;
    }
  }
  document.getElementById('m-body').innerHTML = body;
  document.getElementById('overlay').classList.add('open');
}

function fermerModale(e) { if (e.target === document.getElementById('overlay')) fermerModaleDirecte(); }
function fermerModaleDirecte() { document.getElementById('overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') fermerModaleDirecte(); });
</script>
</body>
</html>
